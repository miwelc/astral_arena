name: Deploy GitHub Pages

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  statuses: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Ensure GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', context.repo);
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.request('POST /repos/{owner}/{repo}/pages', {
                ...context.repo,
                build_type: 'workflow',
              });
            }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --maxWorkers=1

      - name: Build production site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Report Pages deployment status
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const build = process.env.BUILD_RESULT;
            const deploy = process.env.DEPLOY_RESULT;
            const succeeded = build === 'success' && deploy === 'success';
            await github.rest.repos.createCommitStatus({
              ...context.repo,
              sha: context.sha,
              state: succeeded ? 'success' : 'failure',
              context: 'github-pages/deployment',
              description: `Build: ${build}; deploy: ${deploy}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
